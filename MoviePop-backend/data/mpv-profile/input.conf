SPACE cycle pause
MBTN_LEFT cycle pause
MBTN_RIGHT quit-watch-later
MBTN_LEFT_DBL cycle fullscreen
ESC quit-watch-later
q quit-watch-later
f cycle fullscreen
m cycle mute
UP add volume 5
DOWN add volume -5
LEFT seek -5 exact
RIGHT seek 5 exact
WHEEL_UP add volume 3
WHEEL_DOWN add volume -3
> script-message next-episode
< script-message prev-episode
